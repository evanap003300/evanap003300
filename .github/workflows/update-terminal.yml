name: Update terminal SVG

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - generate_terminal.py
      - .github/workflows/update-terminal.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate terminal SVG
        run: python generate_terminal.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain terminal.svg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add terminal.svg
            git commit -m "chore: update terminal stats"
            git push
          else
            echo "no changes"
          fi
